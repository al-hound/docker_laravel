services:
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        working_dir: /var/www/html
        volumes:
            - ./src:/var/www/html
        depends_on:
            - mysql
            - redis
        networks:
            - laravel
    nginx:
        image: nginx:1.30.3-alpine
        ports:
            - "${APP_PORT:-8080}:80"
        volumes:
            - ./src:/var/www/html:ro
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - app
        networks:
            - laravel
    mysql:
        image: mysql:8.4
        environment:
            MYSQL_DATABASE: "${DB_DATABASE:-laravel}"
            MYSQL_USER: "${DB_USERNAME:-laravel}"
            MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
            MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-root_secret}"
        ports: 
            - "${DB_PORT:-3306}:3306"
        volumes:
            - mysql_data:/var/lib/mysql
        networks:
            - laravel
    redis:
        image: redis:8.2-alpine
        ports:
            - "${REDIS_PORT:-6379}:6379"
        volumes:
            - redis_data:/data
        networks:
            - laravel
    vite:
        image: node:24-alpine
        working_dir: /var/www/html
        command: "npm run dev -- --host 0.0.0.0"
        ports:
            - "${VITE_PORT:-5173}:5173"
        volumes:
            - ./src:/var/www/html
        networks:
            - laravel
    mailpit:
        image: axllent/mailpit:v1.30
        ports:
            - "${MAILPIT_DASHBOARD_PORT:-8025}:8025"
            - "${MAILPIT_SMTP_PORT:-1025}:1025"
        networks:
            - laravel

# docker config
volumes: 
    mysql_data:
    redis_data:

networks:
    laravel:
        driver: bridge